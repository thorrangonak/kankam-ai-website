name: Build & Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manuel tetikleme

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci --no-audit --no-fund

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build (static export)
        env:
          NODE_ENV: production
        run: npm run build

      - name: 📋 Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "❌ out/ klasörü oluşmadı"
            exit 1
          fi
          echo "✓ Build başarılı, $(find out -type f | wc -l) dosya üretildi"
          echo "Boyut: $(du -sh out | cut -f1)"

      - name: 🔑 Setup SSH key
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy via rsync
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DO_PORT || 22 }}" \
            ./out/ \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:${{ secrets.DO_PATH }}

      - name: 🔄 Reload Nginx (optional)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DO_PORT || 22 }} \
            ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "sudo nginx -t && sudo systemctl reload nginx || echo '(Nginx reload skipped — sudo gerekebilir)'"

      - name: 🎉 Success
        run: |
          echo "✅ Deploy başarılı"
          echo "🌐 https://kankam.ai"
